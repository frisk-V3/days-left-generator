<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>残り〇〇日ジェネレーター</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>残り〇〇日ジェネレーター</h1>
        
        <div class="input-group">
            <label for="target-date">目標の日付を選んでください：</label>
            <input type="date" id="target-date">
        </div>

        <div id="result-container" class="hidden">
            <p class="message">目標まであと...</p>
            <div class="days-display">
                <span id="days-count">0</span><span class="unit">日</span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
